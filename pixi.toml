[workspace]
name = "claude-science-container"
version = "0.1.0"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

[tasks]
build = { cmd = "CGO_ENABLED=0 go build -o launcher .", cwd = "helper" }
build-linux-amd64 = { cmd = "GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o launcher-linux-amd64 .", cwd = "helper" }
build-linux-arm64 = { cmd = "GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o launcher-linux-arm64 .", cwd = "helper" }
build-darwin-amd64 = { cmd = "GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o launcher-darwin-amd64 .", cwd = "helper" }
build-darwin-arm64 = { cmd = "GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o launcher-darwin-arm64 .", cwd = "helper" }
build-windows-amd64 = { cmd = "GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o launcher-windows-amd64.exe .", cwd = "helper" }
build-all = { depends-on = ["build-linux-amd64", "build-linux-arm64", "build-darwin-amd64", "build-darwin-arm64", "build-windows-amd64"] }

[dependencies]
go = ">=1.26.4,<2"
